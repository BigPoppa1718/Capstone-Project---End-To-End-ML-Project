name: MLOps Automation Workflow Tracking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-ml-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install System Dependencies (OpenMP for XGBoost)
      run: |
        sudo apt-get update
        sudo apt-get install -y libomp-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml pandas numpy scikit-learn xgboost mlflow pytest skops

    - name: Create Empty Data Directory Structure
      run: |
        mkdir -p data/raw
        mkdir -p data/processed

    - name: Execute Step 1 - Data Generation and Preprocessing
      run: |
        # Corrected file name path string to match your preprocess.py asset
        python src/preprocess.py

    - name: Execute Step 2 - Multi-Model Experiment Run
      run: |
        # Corrected training file name path string to match train.py
        python src/train.py

    - name: Execute Step 3 - Automated Unit Tests Suite
      run: |
        # Triggers automated verification rules inside the cloud runner environment
        python -m pytest tests/ -v
